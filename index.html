<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Expense Tracker</title>
<meta name="theme-color" content="#ffffff">
<style>
body{font-family:Arial,sans-serif;max-width:900px;margin:auto;padding:16px;background:#f5f5f5}
.card{background:white;padding:12px;border-radius:10px;margin-bottom:12px}
input,select,button{width:100%;padding:10px;margin:4px 0;box-sizing:border-box}
table{width:100%;border-collapse:collapse} th,td{border:1px solid #ddd;padding:6px}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
</style>
</head>
<body>
<div class="card"><h2>Personal Expense Tracker</h2><p>GitHub Pages Ready</p></div>
<div class="card">
<label>Opening Balance</label>
<input id="opening" type="number" value="0">
<button onclick="saveOpening()">Save</button>
</div>
<div class="card">
<select id="type"><option value="income">Income</option><option value="expense">Expense</option></select>
<input id="name" placeholder="Custom name">
<input id="amount" type="number" placeholder="Amount">
<select id="status"><option value="paid">Paid</option><option value="pending">Pending</option></select>
<button onclick="addTxn()">Add Transaction</button>
</div>
<div class="card grid">
<div><b id="inc">0</b><br>Income</div>
<div><b id="paid">0</b><br>Paid Expense</div>
<div><b id="pending">0</b><br>Pending Expense</div>
<div><b id="avail">0</b><br>Available Balance</div>
</div>
<div class="card">
<table>
<thead><tr><th>Date</th><th>Type</th><th>Name</th><th>Amount</th><th>Status</th></tr></thead>
<tbody id="rows"></tbody>
</table>
</div>
<script>
const KEY="expense_tracker_v1";
function getData(){
 return JSON.parse(localStorage.getItem(KEY)||'{"opening":0,"txns":[]}');
}
function saveData(d){localStorage.setItem(KEY,JSON.stringify(d));}
function saveOpening(){
 let d=getData(); d.opening=Number(opening.value||0); saveData(d); render();
}
function addTxn(){
 let d=getData();
 d.txns.push({
   date:new Date().toISOString().split("T")[0],
   type:type.value,name:name.value,
   amount:Number(amount.value),status:status.value
 });
 saveData(d); name.value=""; amount.value=""; render();
}
function render(){
 let d=getData();
 opening.value=d.opening;
 let income=0,paidExp=0,pendingExp=0;
 rows.innerHTML="";
 d.txns.forEach(t=>{
   if(t.type==="income") income+=t.amount;
   else if(t.status==="paid") paidExp+=t.amount;
   else pendingExp+=t.amount;
   rows.innerHTML += `<tr><td>${t.date}</td><td>${t.type}</td><td>${t.name}</td><td>${t.amount}</td><td>${t.status}</td></tr>`;
 });
 inc.innerText=income;
 paid.innerText=paidExp;
 pending.innerText=pendingExp;
 avail.innerText=d.opening+income-paidExp;
}
render();
</script>
</body></html>
